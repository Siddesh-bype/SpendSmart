<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Spending Analytics</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#342bee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111022",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light font-display text-slate-900">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto bg-white shadow-xl">
<!-- Header -->
<div class="flex items-center p-4 justify-between bg-white border-b border-slate-200">
<button class="flex size-12 items-center justify-center text-slate-900 rounded-full hover:bg-slate-100 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">Spending Analytics</h2>
</div>
<!-- Tabs -->
<div class="bg-white px-4 border-b border-slate-200">
<div class="flex justify-between">
<a class="flex-1 flex flex-col items-center justify-center border-b-2 border-primary text-slate-900 py-3" href="#">
<p class="text-sm font-bold tracking-wide">Breakdown</p>
</a>
<a class="flex-1 flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 hover:text-slate-700 py-3" href="#">
<p class="text-sm font-bold tracking-wide">Trend</p>
</a>
<a class="flex-1 flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 hover:text-slate-700 py-3" href="#">
<p class="text-sm font-bold tracking-wide">Category</p>
</a>
</div>
</div>
<!-- Content Area -->
<div class="flex-1 overflow-y-auto pb-24">
<!-- Donut Chart Section (Mockup) -->
<div class="p-6 bg-white">
<div class="relative w-48 h-48 mx-auto mb-6">
<!-- SVG Donut Chart Mockup -->
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="transparent" r="40" stroke="#f1f5f9" stroke-width="16"></circle>
<circle cx="50" cy="50" fill="transparent" r="40" stroke="#342bee" stroke-dasharray="82.9 251.2" stroke-dashoffset="0" stroke-width="16"></circle>
<circle cx="50" cy="50" fill="transparent" r="40" stroke="#10b981" stroke-dasharray="65.3 251.2" stroke-dashoffset="-82.9" stroke-width="16"></circle>
<circle cx="50" cy="50" fill="transparent" r="40" stroke="#f59e0b" stroke-dasharray="45.2 251.2" stroke-dashoffset="-148.2" stroke-width="16"></circle>
<circle cx="50" cy="50" fill="transparent" r="40" stroke="#ef4444" stroke-dasharray="57.8 251.2" stroke-dashoffset="-193.4" stroke-width="16"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<p class="text-xs text-slate-500 font-medium">Total Spent</p>
<p class="text-xl font-bold text-slate-900">₹45,200</p>
</div>
</div>
<!-- Legend / Breakdown List -->
<div class="space-y-4">
<div class="flex items-center justify-between p-3 rounded-lg bg-slate-50">
<div class="flex items-center gap-3">
<div class="w-3 h-3 rounded-full bg-primary"></div>
<p class="text-sm font-medium text-slate-700">Food &amp; Dining</p>
</div>
<div class="text-right">
<p class="text-sm font-bold text-slate-900">₹15,000</p>
<p class="text-xs text-slate-500">33%</p>
</div>
</div>
<div class="flex items-center justify-between p-3 rounded-lg bg-slate-50">
<div class="flex items-center gap-3">
<div class="w-3 h-3 rounded-full bg-emerald-500"></div>
<p class="text-sm font-medium text-slate-700">Shopping</p>
</div>
<div class="text-right">
<p class="text-sm font-bold text-slate-900">₹12,000</p>
<p class="text-xs text-slate-500">26%</p>
</div>
</div>
<div class="flex items-center justify-between p-3 rounded-lg bg-slate-50">
<div class="flex items-center gap-3">
<div class="w-3 h-3 rounded-full bg-amber-500"></div>
<p class="text-sm font-medium text-slate-700">Transportation</p>
</div>
<div class="text-right">
<p class="text-sm font-bold text-slate-900">₹8,000</p>
<p class="text-xs text-slate-500">18%</p>
</div>
</div>
<div class="flex items-center justify-between p-3 rounded-lg bg-slate-50">
<div class="flex items-center gap-3">
<div class="w-3 h-3 rounded-full bg-red-500"></div>
<p class="text-sm font-medium text-slate-700">Bills &amp; Utilities</p>
</div>
<div class="text-right">
<p class="text-sm font-bold text-slate-900">₹10,200</p>
<p class="text-xs text-slate-500">23%</p>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-slate-200 px-4 py-2 flex justify-between">
<a class="flex flex-col items-center p-2 text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined mb-1">home</span>
<span class="text-[10px] font-medium">Home</span>
</a>
<a class="flex flex-col items-center p-2 text-primary transition-colors" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">pie_chart</span>
<span class="text-[10px] font-medium">Analytics</span>
</a>
<a class="flex flex-col items-center p-2 text-slate-500 hover:text-primary transition-colors" href="#">
<div class="bg-primary text-white rounded-full p-2 -mt-6 shadow-lg">
<span class="material-symbols-outlined">add</span>
</div>
</a>
<a class="flex flex-col items-center p-2 text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined mb-1">sms</span>
<span class="text-[10px] font-medium">Auto-Detect</span>
</a>
<a class="flex flex-col items-center p-2 text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined mb-1">person</span>
<span class="text-[10px] font-medium">Profile</span>
</a>
</div>
</div>
</body></html>

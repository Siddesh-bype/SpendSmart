<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SpendSmart Splash Screen</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#6961ff",
              "background-light": "#f5f5f8",
              "background-dark": "#100f23",
            },
            fontFamily: {
              "display": ["Manrope", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.5rem", 
              "lg": "1rem", 
              "xl": "1.5rem", 
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/30">
<div class="relative flex min-h-[100dvh] w-full flex-col items-center justify-center overflow-hidden bg-gradient-to-b from-background-light to-primary/10 dark:from-background-dark dark:to-primary/20">
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-1/4 -right-1/4 w-[500px] h-[500px] rounded-full bg-primary/20 blur-3xl opacity-50 dark:opacity-30"></div>
<div class="absolute -bottom-1/4 -left-1/4 w-[600px] h-[600px] rounded-full bg-primary/20 blur-3xl opacity-50 dark:opacity-30"></div>
</div>
<div class="relative z-10 flex flex-col items-center px-6 text-center">
<div class="mb-8 flex h-28 w-28 items-center justify-center rounded-[2rem] bg-primary text-white shadow-2xl shadow-primary/40 ring-8 ring-primary/10 dark:ring-primary/20">
<span class="material-symbols-outlined text-6xl" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">
                    account_balance_wallet
                </span>
</div>
<h1 class="mb-3 text-[40px] font-extrabold leading-tight tracking-tight text-slate-900 dark:text-white">
                SpendSmart
            </h1>
<p class="max-w-[260px] text-lg font-medium leading-relaxed text-slate-600 dark:text-slate-400">
                Your personal expense tracker
            </p>
</div>
<div class="absolute bottom-12 left-0 right-0 flex justify-center">
<div class="flex items-center gap-2 text-sm font-semibold text-primary/80 dark:text-primary/60">
<span class="material-symbols-outlined text-base">security</span>
<span>Secured by UPI</span>
</div>
</div>
</div>
</body></html>
